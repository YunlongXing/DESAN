# DESAN smoke/evaluation config for SPEC CPU2017.
# This is for local validation, not reportable SPEC submissions.

%ifndef %{label}
%   define label desan
%endif
%ifndef %{build_ncpus}
%   define build_ncpus 2
%endif

ignore_errors   = 1
iterations      = 1
label           = %{label}
line_width      = 1020
log_line_width  = 1020
makeflags       = --jobs=%{build_ncpus}
mean_anyway     = 1
output_format   = txt,csv
preenv          = 1
preENV_ASAN_OPTIONS = detect_leaks=0
tune            = base
reportable      = 0

default:
   CC           = /home/dragon/DESAN/scripts/spec_desan_cc.sh
   CXX          = /home/dragon/DESAN/scripts/spec_desan_cxx.sh
   FC           = /home/dragon/DESAN/scripts/spec_desan_fc.sh
   CLD          = /home/dragon/DESAN/scripts/spec_desan_cc.sh
   CXXLD        = /home/dragon/DESAN/scripts/spec_desan_cxx.sh
   FLD          = /home/dragon/DESAN/scripts/spec_desan_fc.sh
   CC_VERSION_OPTION  = --version
   CXX_VERSION_OPTION = --version
   FC_VERSION_OPTION  = --version
   OPTIMIZE     = -O0 -g
   EXTRA_CFLAGS = -fcommon -Wno-sign-conversion -Wno-constant-conversion -Wno-error=sign-conversion -Wno-error=constant-conversion -Wno-error=implicit-int -Wno-implicit-int
   EXTRA_CXXFLAGS = -std=gnu++98 -fheinous-gnu-extensions -include cstdlib -include cstring -include stddef.h -include string.h
   EXTRA_FFLAGS = -std=legacy -fallow-argument-mismatch -fallow-invalid-boz -ffixed-line-length-0 -ffree-line-length-none
   PORTABILITY  = -DSPEC_LP64

default=base:
   OPTIMIZE     = -O0 -g

intrate,fprate:
   copies       = 1

intspeed,fpspeed:
   threads      = 1

500.perlbench_r,600.perlbench_s:
   PORTABILITY = -DSPEC_LINUX_X64

502.gcc_r,602.gcc_s:
   PORTABILITY = -DSPEC_LP64

520.omnetpp_r,620.omnetpp_s:
   PORTABILITY = -DSPEC_LP64

523.xalancbmk_r,623.xalancbmk_s:
   PORTABILITY = -DSPEC_LINUX

521.wrf_r,621.wrf_s:
   CPORTABILITY = -DSPEC_CASE_FLAG
   FPORTABILITY = -fconvert=big-endian

526.blender_r:
   CPORTABILITY = -funsigned-char
   CXXPORTABILITY = -D__BOOL_DEFINED

527.cam4_r,627.cam4_s:
   PORTABILITY = -DSPEC_CASE_FLAG

628.pop2_s:
   CPORTABILITY = -DSPEC_CASE_FLAG
   FPORTABILITY = -fconvert=big-endian
