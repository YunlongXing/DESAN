# DESAN smoke/evaluation config for SPEC CPU2006.
# This is for local validation, not reportable SPEC submissions.

ext           = desan
tune          = base
output_format = text,csv
iterations    = 1
ignore_errors = yes
makeflags     = -j2
reportable    = 0

default=default=default=default:
CC            = /home/dragon/DESAN/scripts/spec_desan_cc.sh
CXX           = /home/dragon/DESAN/scripts/spec_desan_cxx.sh
FC            = /home/dragon/DESAN/scripts/spec_desan_fc.sh
sw_compiler   = DESAN Clang sanitizer wrapper
OPTIMIZE      = -O0 -g -fcommon
EXTRA_CFLAGS  = -Wno-error=int-conversion -Wno-error=implicit-function-declaration -Wno-error=implicit-int -Wno-error=incompatible-function-pointer-types
EXTRA_CXXFLAGS = -std=gnu++03 -include cstdlib -include cstring -include stddef.h -include string.h
EXTRA_FFLAGS  = -std=legacy -fallow-argument-mismatch -fallow-invalid-boz -ffixed-line-length-0 -ffree-line-length-none
PORTABILITY   = -DSPEC_CPU_LP64

400.perlbench=default=default=default:
CPORTABILITY  = -DSPEC_CPU_LINUX_X64

462.libquantum=default=default=default:
CPORTABILITY  = -DSPEC_CPU_LINUX

483.xalancbmk=default=default=default:
CXXPORTABILITY = -DSPEC_CPU_LINUX

481.wrf=default=default=default:
CPORTABILITY = -DNOUNDERSCORE
FPORTABILITY = -fno-underscoring
